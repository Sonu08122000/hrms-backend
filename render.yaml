services:
  - type: web
    name: hrms-lite-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false   # Set this manually in Render dashboard (use MongoDB Atlas URI)
      - key: DB_NAME
        value: hrms_lite